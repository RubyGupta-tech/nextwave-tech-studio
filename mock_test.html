<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Live Practice - Centered Modal</title>
    <style>
        .hidden {
            display: none;
        }

        #modalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .modal-text {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <!-- 1. Add a button to open the modal -->
    <button id="openModalBtn">Open Modal</button>

    <!-- 2. Build the modal structure (Overlay and Content) -->
    <div id="modalOverlay" class="hidden">
        <div class="modal">
            <p class="modal-text">This is a centered modal</p>
            <button id="closeModalBtn">Close</button>
        </div>
    </div>

    <!-- 4. Add JS to Toggle the visibility -->
    <script>
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const overlay = document.getElementById('modalOverlay');

        openBtn.addEventListener('click', () => {
            overlay.classList.remove('hidden');
        });

        closeBtn.addEventListener('click', () => {
            overlay.classList.add('hidden');
        });

        // Close when clicking outside the modal
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
